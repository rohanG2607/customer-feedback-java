<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Manage Feedback')}"></head>

<body>

	<div th:replace="~{fragments/navbar :: navbar}"></div>

	<div class="container mt-5">

		<h2 class="page-title">
			<div class="alert alert-success"
			     th:if="${success}"
			     th:text="${success}">
			</div>

			Manage Feedback

		</h2>

		<div class="card p-4">

			<div class="table-responsive">

				<table class="table table-hover align-middle">

					<thead>

						<tr>

							<th>ID</th>

							<th>User</th>

							<th>Email</th>

							<th>Title</th>

							<th>Description</th>

							<th>Created</th>

							<th>Updated</th>

							<th>Actions</th>

						</tr>

					</thead>

					<tbody>

						<tr th:each="feedback : ${feedbacks}">

							<td th:text="${feedback.id}"></td>

							<td th:text="${feedback.user.fullName}"></td>

							<td th:text="${feedback.user.email}"></td>

							<td th:text="${feedback.title}"></td>

							<td th:text="${feedback.description}"></td>

							<td th:text="${#temporals.format(feedback.createdAt, 'dd MMM yyyy hh:mm a')}"></td>

							<td th:text="${#temporals.format(feedback.updatedAt, 'dd MMM yyyy hh:mm a')}"></td>

							<td>

								<a class="btn btn-warning btn-sm"
									th:href="@{/admin/feedback/edit/{id}(id=${feedback.id})}">

									<i class="bi bi-pencil-square"></i>

									Edit

								</a>

								<form th:action="@{/admin/feedback/delete/{id}(id=${feedback.id})}" method="post"
									style="display:inline;">

									<button class="btn btn-danger btn-sm"
										onclick="return confirm('Delete this feedback?')">

										<i class="bi bi-trash"></i>

										Delete

									</button>

								</form>

							</td>

						</tr>

					</tbody>

				</table>

			</div>

		</div>

	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
